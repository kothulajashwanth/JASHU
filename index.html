<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRIO MODE ON</title>

  <style>
    :root {
      --card-height: 300px;
      --card-width: calc(var(--card-height) / 1.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      background: #151f28;
      overflow-x: auto;
    }

    .card {
      width: var(--card-width);
      height: var(--card-height);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding: 0 36px;
      perspective: 2500px;
      cursor: pointer;
    }

    .wrapper {
      position: absolute;
      width: 100%;
      transition: .5s;
      z-index: -1;
    }

    .cover-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card:hover .wrapper {
      transform: perspective(900px) rotateX(25deg) translateY(-5%);
      box-shadow: 0 35px 32px rgba(0,0,0,.75);
    }

    .wrapper::before,
    .wrapper::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      transition: .5s;
    }

    .wrapper::before {
      top: 0;
      height: 100%;
      opacity: 0;
      background: linear-gradient(to top,
          transparent 46%,
          rgba(12,13,19,.5) 68%,
          rgba(12,13,19,1) 97%);
    }

    .wrapper::after {
      bottom: 0;
      height: 80px;
      opacity: 1;
      background: linear-gradient(to bottom,
          transparent 46%,
          rgba(12,13,19,.5) 68%,
          rgba(12,13,19,1) 97%);
    }

    .card:hover .wrapper::before {
      opacity: 1;
    }

    .card:hover .wrapper::after {
      height: 120px;
    }

    .title {
      width: 100%;
      transition: .5s;
    }

    .card:hover .title {
      transform: translateY(-50px);
    }

    .character {
      width: 100%;
      position: absolute;
      opacity: 0;
      transition: .5s;
      z-index: -1;
    }

    .card:hover .character {
      opacity: 1;
      transform: translateY(-30%);
    }
  </style>

</head>

<body>

  <div class="card">
    <div class="wrapper">
      <img src="Images/jash_card.jpeg" class="cover-image" alt="">
    </div>
    <img src="Images/jash_title.png" class="title" alt="">
    <img src="Images/jash_solo.png" class="character" alt="">
  </div>

  <div class="card">
    <div class="wrapper">
      <img src="Images/sandhya_card.jpeg" class="cover-image" alt="">
    </div>
    <img src="Images/sandhya_title.png" class="title" alt="">
    <img src="Images/sandhya_solo.png" class="character" alt="">
  </div>

  <div class="card">
    <div class="wrapper">
      <img src="Images/chidvi_card.jpeg" class="cover-image" alt="">
    </div>
    <img src="Images/chidvi_title.png" class="title" alt="">
    <img src="Images/chidvi_solo.png" class="character" alt="">
  </div>

</body>

</html>
